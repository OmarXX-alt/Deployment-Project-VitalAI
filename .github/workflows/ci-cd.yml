name: CI

on:
  push:
    branches:
      - main
      - Develop
  pull_request:
    branches:
      - main
      - Develop

jobs:
  ## Job 1: Lint, test, build, smoke test, and push Docker image
  build-and-test:
    name: Lint · Test · Build · Smoke Test · Push
    runs-on: ubuntu-latest
    env:
      IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME || github.repository_owner }}
 
    steps:
      # ── Step 1: Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Validate required secrets ─────────────────────────────────
      - name: Validate GEMINI_API_KEY secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY secret is missing."
            exit 1
          fi

      # ── Step 2b: Select branch-specific image repo/tags ───────────────────
      - name: Set image variables
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET_BRANCH="${{ github.base_ref }}"
          else
            TARGET_BRANCH="${{ github.ref_name }}"
          fi

          if [ "$TARGET_BRANCH" = "main" ]; then
            IMAGE_REPO="vitalai-main"
            BRANCH_TAG="main"
          elif [ "$TARGET_BRANCH" = "Develop" ]; then
            IMAGE_REPO="vitalai-dev"
            BRANCH_TAG="dev"
          else
            IMAGE_REPO="vitalai-dev"
            BRANCH_TAG="dev"
          fi

          echo "IMAGE_NAME=${IMAGE_NAMESPACE}/${IMAGE_REPO}" >> $GITHUB_ENV
          echo "BRANCH_TAG=${BRANCH_TAG}" >> $GITHUB_ENV
 
      # ── Step 3: Set up Python runtime ───────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      # ── Step 4: Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      # ── Step 5: Unit tests ───────────────────────────────────────────────────
      - name: Run unit tests (pytest)
        run: |
          pip install pytest pytest-cov
          pytest --cov=. --cov-report=term-missing -v
 
      # ── Step 6: Log in to Docker Hub ────────────────────────────────────────
      # Secrets required in GitHub → Settings → Secrets → Actions:
      #   DOCKERHUB_USERNAME  – your Docker Hub username
      #   DOCKERHUB_TOKEN     – a Docker Hub access token (not your password)
      - name: Log in to Docker Hub
        if: |
          (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'Develop')) ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      # ── Step 7: Build Docker image ───────────────────────────────────────────
      # Two tags are applied:
      #   :<sha>     – immutable, pinned to this exact commit
      #   :<branch>  – main or dev for quick environment pulls
      #   :latest    – floating tag per environment image repo
      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:${BRANCH_TAG} \
            -t $IMAGE_NAME:latest \
            .
 
      # ── Step 8: Smoke test – start container & probe health endpoint ─────────
      - name: Smoke test – health endpoint
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          docker run --detach \
            --name test-container \
            --publish 5000:5000 \
            $IMAGE_NAME:latest
 
          echo "Waiting for container to become ready..."
          sleep 5
 
          # Retry up to 10 times (10 s total) before declaring failure
          HEALTH_OK=0
          for i in $(seq 1 10); do
            STATUS=$(curl --silent --output /dev/null \
                          --write-out "%{http_code}" \
                          http://localhost:5000/health || true)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "Health check passed."
              HEALTH_OK=1
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "Health check failed after 10 attempts."
              docker logs test-container
              docker stop test-container
              exit 1
            fi
            sleep 1
          done

          if [ "$HEALTH_OK" -ne 1 ]; then
            echo "Health check did not succeed."
            docker stop test-container
            exit 1
          fi

          echo "Checking Gemini API connectivity..."
          GEMINI_STATUS=$(curl --silent --output /tmp/gemini_response.json \
                                --write-out "%{http_code}" \
                                "https://generativelanguage.googleapis.com/v1beta/models?key=${GEMINI_API_KEY}" || true)
          if [ "$GEMINI_STATUS" -ne 200 ]; then
            echo "Gemini API check failed with HTTP $GEMINI_STATUS"
            cat /tmp/gemini_response.json || true
            docker stop test-container
            exit 1
          fi
          echo "Gemini API check passed."

          docker stop test-container
 
      # ── Step 9: Push to Docker Hub ───────────────────────────────────────────
      # Runs on pushes to main/Develop and PRs from the same repo (fork PRs skip
      # publish because secrets are not available).
      - name: Push image to Docker Hub
        if: |
          (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'Develop')) ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:${BRANCH_TAG}
          docker push $IMAGE_NAME:latest
      
      # ── Step 10: Lint / static analysis ─────────────────────────────────────
      - name: Run linter (flake8)
        run: |
          pip install flake8
          # Hard stop on syntax errors only
          flake8 . --count --select=E9 --show-source --statistics \
            --exclude .venv,venv,**/site-packages,**/__pycache__
          # Style pass with a generous 120-char line limit
          flake8 . --count --max-line-length=120 --statistics \
            --exclude .venv,venv,**/site-packages,**/__pycache__
  
  #-- Job 2: Deploy to Render (only on pushes to main/Develop, not on PRs) ───────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test          # only runs after job 1 succeeds
    if: github.event_name == 'push'   # skip on PRs

    steps:

      - name: Trigger Render deploy
        run: |
          echo "🚀 Triggering deploy on Render..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
             "${{ secrets.RENDER_DEPLOY_URL }}")
          echo "Render response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "❌ Deploy trigger failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "✅ Deploy triggered successfully"
          
