name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vitalai .

      - name: Run container
        run: docker run -d -p 8080:80 --name vitalai-container vitalai

      - name: Wait for container
        run: sleep 5

      - name: Test health endpoint
        run: curl -f http://localhost:8080 || exit 1

      - name: Stop container
        run: docker stop vitalai-container && docker rm vitalai-container