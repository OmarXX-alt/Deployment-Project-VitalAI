name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ## Job 1: Lint, test, build, smoke test, and push Docker image
  build-and-test:
    name: Lint · Test · Build · Smoke Test · Push
    runs-on: ubuntu-latest
 
    steps:
      # ── Step 1: Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # ── Step 2: Set up Python runtime ───────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      # ── Step 3: Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      # ── Step 4: Lint / static analysis ──────────────────────────────────────
      - name: Run linter (flake8)
        run: |
          pip install flake8
          # Hard stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Style pass with a generous 120-char line limit
          flake8 . --count --max-line-length=120 --statistics
 
      # ── Step 5: Unit tests ───────────────────────────────────────────────────
      - name: Run unit tests (pytest)
        run: |
          pip install pytest pytest-cov
          pytest --cov=. --cov-report=term-missing -v
 
      # ── Step 6: Log in to Docker Hub ────────────────────────────────────────
      # Secrets required in GitHub → Settings → Secrets → Actions:
      #   DOCKERHUB_USERNAME  – your Docker Hub username
      #   DOCKERHUB_TOKEN     – a Docker Hub access token (not your password)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      # ── Step 7: Build Docker image ───────────────────────────────────────────
      # Two tags are applied:
      #   :ci-<sha>  – immutable, pinned to this exact commit
      #   :latest    – floating tag, updated on every main push
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --label "git-sha=${{ github.sha }}" \
            .
 
      # ── Step 8: Smoke test – start container & probe health endpoint ─────────
      - name: Smoke test – health endpoint
        run: |
          docker run --detach \
            --name test-container \
            --publish 5000:5000 \
            ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}:lastest
 
          echo "Waiting for container to become ready..."
          sleep 5
 
          # Retry up to 10 times (10 s total) before declaring failure
          for i in $(seq 1 10); do
            STATUS=$(curl --silent --output /dev/null \
                          --write-out "%{http_code}" \
                          http://localhost:5000/health || true)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "Health check passed."
              docker stop flask-smoke
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "Health check failed after 10 attempts."
              docker logs flask-smoke
              docker stop flask-smoke
              exit 1
            fi
            sleep 1
          done
 
      # ── Step 9: Push to Docker Hub ───────────────────────────────────────────
      # Runs only on direct pushes to main (skipped for pull requests so that
      # unreviewed code is never published to the registry).
      - name: Push image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
