name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - Develop
  pull_request:
    branches:
      - main
      - Develop

jobs:
  ## Job 1: Lint, test, build, smoke test, and push Docker image
  build-and-test:
    name: Lint · Test · Build · Smoke Test · Push
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/vitalai
 
    steps:
      # ── Step 1: Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Validate required secrets ─────────────────────────────────
      - name: Validate GEMINI_API_KEY secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY secret is missing."
            exit 1
          fi
 
      # ── Step 3: Set up Python runtime ───────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      # ── Step 4: Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      # ── Step 5: Unit tests ───────────────────────────────────────────────────
      - name: Run unit tests (pytest)
        run: |
          pip install pytest pytest-cov
          pytest --cov=. --cov-report=term-missing -v
 
      # ── Step 6: Log in to Docker Hub ────────────────────────────────────────
      # Secrets required in GitHub → Settings → Secrets → Actions:
      #   DOCKERHUB_USERNAME  – your Docker Hub username
      #   DOCKERHUB_TOKEN     – a Docker Hub access token (not your password)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      # ── Step 7: Build Docker image ───────────────────────────────────────────
      # Two tags are applied:
      #   :ci-<sha>  – immutable, pinned to this exact commit
      #   :latest    – floating tag, updated on every main push
      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ github.sha }} \
            -t $IMAGE_NAME:latest \
            .
 
      # ── Step 8: Smoke test – start container & probe health endpoint ─────────
      - name: Smoke test – health endpoint
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          docker run --detach \
            --name test-container \
            --publish 5000:5000 \
            $IMAGE_NAME:latest
 
          echo "Waiting for container to become ready..."
          sleep 5
 
          # Retry up to 10 times (10 s total) before declaring failure
          HEALTH_OK=0
          for i in $(seq 1 10); do
            STATUS=$(curl --silent --output /dev/null \
                          --write-out "%{http_code}" \
                          http://localhost:5000/health || true)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "Health check passed."
              HEALTH_OK=1
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "Health check failed after 10 attempts."
              docker logs test-container
              docker stop test-container
              exit 1
            fi
            sleep 1
          done

          if [ "$HEALTH_OK" -ne 1 ]; then
            echo "Health check did not succeed."
            docker stop test-container
            exit 1
          fi

          echo "Checking Gemini API connectivity..."
          GEMINI_STATUS=$(curl --silent --output /tmp/gemini_response.json \
                                --write-out "%{http_code}" \
                                "https://generativelanguage.googleapis.com/v1beta/models?key=${GEMINI_API_KEY}" || true)
          if [ "$GEMINI_STATUS" -ne 200 ]; then
            echo "Gemini API check failed with HTTP $GEMINI_STATUS"
            cat /tmp/gemini_response.json || true
            docker stop test-container
            exit 1
          fi
          echo "Gemini API check passed."

          docker stop test-container
 
      # ── Step 9: Push to Docker Hub ───────────────────────────────────────────
      # Runs only on direct pushes to main (skipped for pull requests so that
      # unreviewed code is never published to the registry).
      - name: Push image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest
      
      # ── Step 10: Lint / static analysis ─────────────────────────────────────
      - name: Run linter (flake8)
        run: |
          pip install flake8
          # Hard stop on syntax errors only
          flake8 . --count --select=E9 --show-source --statistics \
            --exclude .venv,venv,**/site-packages,**/__pycache__
          # Style pass with a generous 120-char line limit
          flake8 . --count --max-line-length=120 --statistics \
            --exclude .venv,venv,**/site-packages,**/__pycache__
