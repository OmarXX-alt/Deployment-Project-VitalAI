<!DOCTYPE html>
<html>
<head>
    <title>VitalAI - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="landing-body">
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h2>Hello, <span id="user-name">Resident</span></h2>
                <p class="user-info">Goal: <span id="user-goal" style="text-transform: capitalize;">General Health</span> • <span id="user-diet">N/A</span> kcal max</p>
            </div>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>

        <!-- CHARTS SECTION (Issue #23) -->
        <div class="charts-container">
            <div class="chart-card">
                <h3>📊 Weekly Calories</h3>
                <canvas id="caloriesChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>😴 Weekly Sleep</h3>
                <canvas id="sleepChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>💪 Weekly Workouts</h3>
                <canvas id="workoutsChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>💧 Weekly Hydration</h3>
                <canvas id="hydrationChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>😊 Weekly Mood</h3>
                <canvas id="moodChart"></canvas>
            </div>
        </div>

        <!-- LOG FORMS SECTION -->
        <div class="log-section">
            <h3>Log Your Health Data</h3>
            <div class="log-grid">
                <!-- MEAL LOGGER -->
                <div class="log-card">
                    <h4>🍽️ Log Meal</h4>
                    <input type="text" id="meal-food" placeholder="Food item">
                    <input type="number" id="meal-cals" placeholder="Calories" min="0">
                    <input type="number" id="meal-protein" placeholder="Protein (g)" min="0">
                    <button onclick="logMeal()">Save Meal</button>
                    <div id="meal-ai" class="ai-response hidden"></div>
                </div>

                <!-- WORKOUT LOGGER -->
                <div class="log-card">
                    <h4>💪 Log Workout</h4>
                    <input type="text" id="workout-type" placeholder="Exercise">
                    <input type="number" id="workout-duration" placeholder="Minutes" min="0">
                    <select id="workout-intensity">
                        <option value="low">Low</option>
                        <option value="moderate">Moderate</option>
                        <option value="high">High</option>
                    </select>
                    <button onclick="logWorkout()">Save Workout</button>
                    <div id="workout-ai" class="ai-response hidden"></div>
                </div>

                <!-- SLEEP LOGGER -->
                <div class="log-card">
                    <h4>😴 Log Sleep</h4>
                    <input type="number" id="sleep-hours" placeholder="Hours slept" step="0.5" min="0" max="24">
                    <select id="sleep-quality">
                        <option value="poor">Poor</option>
                        <option value="fair">Fair</option>
                        <option value="good">Good</option>
                        <option value="excellent">Excellent</option>
                    </select>
                    <button onclick="logSleep()">Save Sleep</button>
                    <div id="sleep-ai" class="ai-response hidden"></div>
                </div>

                <!-- HYDRATION LOGGER -->
                <div class="log-card">
                    <h4>💧 Log Hydration</h4>
                    <input type="number" id="water-ml" placeholder="ml consumed" min="0">
                    <button onclick="logWater()">Add Water</button>
                    <div id="water-ai" class="ai-response hidden"></div>
                </div>

                <!-- MOOD LOGGER -->
                <div class="log-card">
                    <h4>😊 Mood Check-in</h4>
                    <input type="range" id="mood-rating" min="1" max="10" value="5">
                    <span id="mood-value">5</span>/10
                    <input type="text" id="mood-notes" placeholder="How are you feeling?">
                    <button onclick="logMood()">Save Mood</button>
                    <div id="mood-ai" class="ai-response hidden"></div>
                </div>
            </div>
        </div>

        <!-- WEEKLY INSIGHT BUTTON -->
        <div class="card">
            <h3>📊 Weekly Wellness Insight</h3>
            <button onclick="getWeeklyInsight()">Get My AI Insight</button>
            <div id="weekly-insight" class="ai-response hidden"></div>
        </div>

        <!-- CHAT ASSISTANT -->
        <div class="card chat-card">
            <h3>🤖 VitalAI Chat</h3>
            <div class="chat-thread" id="chat-thread"></div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="Ask about your week...">
                <button class="chat-send" onclick="sendChat()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Get token from localStorage
        const token = localStorage.getItem('token');

        // Check if user is logged in
        if (!token) {
            window.location.href = '/login';
        }

        // Mood slider display
        document.getElementById('mood-rating').oninput = function() {
            document.getElementById('mood-value').textContent = this.value;
        };

        // Logout function
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login';
        }

        // User Profile Data Fetch
        fetch('/api/profile', {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(response => response.json())
        .then(data => {
            if (data.display_name) {
                document.getElementById('user-name').textContent = data.display_name;
            }
            if (data.wellness_goal) {
                document.getElementById('user-goal').textContent = data.wellness_goal.replace('_', ' ');
            }
            if (data.calorie_target) {
                document.getElementById('user-diet').textContent = data.calorie_target;
            }
        })
        .catch(err => console.error("Error fetching profile:", err));

        // ========== CHART INITIALIZATION (Issue #23) ==========
        let caloriesChart, sleepChart, workoutsChart, hydrationChart, moodChart;

        function initCharts() {
            const ctx1 = document.getElementById('caloriesChart').getContext('2d');
            const ctx2 = document.getElementById('sleepChart').getContext('2d');
            const ctx3 = document.getElementById('workoutsChart').getContext('2d');
            const ctx4 = document.getElementById('hydrationChart').getContext('2d');
            const ctx5 = document.getElementById('moodChart').getContext('2d');

            caloriesChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{ label: 'Calories', data: [0,0,0,0,0,0,0], borderColor: '#7e57c2', backgroundColor: 'rgba(126,87,194,0.1)', tension: 0.3 }]
                }
            });

            sleepChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{ label: 'Hours Slept', data: [0,0,0,0,0,0,0], backgroundColor: '#7e57c2' }]
                }
            });

            workoutsChart = new Chart(ctx3, {
                type: 'bar',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{ label: 'Workout (min)', data: [0,0,0,0,0,0,0], backgroundColor: '#b39ddb' }]
                }
            });

            hydrationChart = new Chart(ctx4, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{ label: 'Water (ml)', data: [0,0,0,0,0,0,0], borderColor: '#2196f3', backgroundColor: 'rgba(33,150,243,0.1)', tension: 0.3 }]
                }
            });

            moodChart = new Chart(ctx5, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{ label: 'Mood (1-10)', data: [0,0,0,0,0,0,0], borderColor: '#6a1b9a', backgroundColor: 'rgba(106,27,154,0.1)', tension: 0.3 }]
                }
            });
        }

        // Update charts with real data
        function updateCharts() {
            fetch('/api/dashboard', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(response => response.json())
            .then(data => {
                const caloriesSeries = Array.isArray(data.calories_7d)
                    ? data.calories_7d
                    : [];
                const sleepSeries = Array.isArray(data.sleep_duration_7d)
                    ? data.sleep_duration_7d
                    : [];
                const workoutSeries = Array.isArray(data.workout_count_7d)
                    ? data.workout_count_7d
                    : [];
                const hydrationSeries = Array.isArray(data.hydration_7d)
                    ? data.hydration_7d
                    : [];
                const moodSeries = Array.isArray(data.mood_7d)
                    ? data.mood_7d
                    : [];

                const labels = caloriesSeries.map(point => point.date);
                caloriesChart.data.labels = labels;
                caloriesChart.data.datasets[0].data = caloriesSeries.map(
                    point => point.kcal
                );

                sleepChart.data.labels = labels;
                sleepChart.data.datasets[0].data = sleepSeries.map(
                    point => point.hours
                );

                workoutsChart.data.labels = labels;
                workoutsChart.data.datasets[0].data = workoutSeries.map(
                    point => point.count
                );

                hydrationChart.data.labels = labels;
                hydrationChart.data.datasets[0].data = hydrationSeries.map(
                    point => point.ml
                );

                moodChart.data.labels = labels;
                moodChart.data.datasets[0].data = moodSeries.map(
                    point => point.score
                );

                caloriesChart.update();
                sleepChart.update();
                workoutsChart.update();
                hydrationChart.update();
                moodChart.update();
            })
            .catch(error => console.error('Error updating charts:', error));
        }

        // ========== LOGGING FUNCTIONS (with auto chart update) ==========
        
        function logMeal() {
            const mealName = document.getElementById('meal-food').value.trim();
            const caloriesValue = parseInt(document.getElementById('meal-cals').value, 10);
            if (!mealName) {
                showAI('meal-ai', '❌ Please enter a meal name.');
                return;
            }
            if (!Number.isFinite(caloriesValue)) {
                showAI('meal-ai', '❌ Please enter a valid calorie amount.');
                return;
            }
            const data = {
                meal_name: mealName,
                calories: caloriesValue,
                meal_type: 'lunch'
            };

            fetch('/api/logs/meal', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json().then(data => ({ response, data })))
            .then(({ response, data }) => {
                if (response.ok) {
                    const reactionMessage = data.reaction && data.reaction.message;
                    showAI('meal-ai', reactionMessage || '✅ Meal logged!');
                    updateCharts();
                    clearMealForm();
                } else {
                    const errorFields = Array.isArray(data.fields) ? data.fields.join(' | ') : null;
                    showAI('meal-ai', errorFields || data.message || '❌ Error logging meal');
                }
            })
            .catch(() => showAI('meal-ai', '❌ Error logging meal'));
        }

        function logWorkout() {
            const exerciseType = document.getElementById('workout-type').value.trim();
            const durationValue = parseInt(document.getElementById('workout-duration').value, 10);
            if (!exerciseType) {
                showAI('workout-ai', '❌ Please enter an exercise type.');
                return;
            }
            if (!Number.isFinite(durationValue) || durationValue < 1) {
                showAI('workout-ai', '❌ Duration must be at least 1 minute.');
                return;
            }
            const data = {
                exercise_type: exerciseType,
                duration_minutes: durationValue,
                intensity: document.getElementById('workout-intensity').value
            };

            fetch('/api/logs/workout', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json().then(data => ({ response, data })))
            .then(({ response, data }) => {
                if (response.ok) {
                    const reactionMessage = data.reaction && data.reaction.message;
                    showAI('workout-ai', reactionMessage || '💪 Workout logged!');
                    updateCharts();
                    clearWorkoutForm();
                } else {
                    const errorFields = Array.isArray(data.fields) ? data.fields.join(' | ') : null;
                    showAI('workout-ai', errorFields || data.message || '❌ Error logging workout');
                }
            })
            .catch(() => showAI('workout-ai', '❌ Error logging workout'));
        }

        function logSleep() {
            const hours = parseFloat(document.getElementById('sleep-hours').value);
            if (!Number.isFinite(hours) || hours <= 0) {
                showAI('sleep-ai', '❌ Please enter hours slept greater than 0.');
                return;
            }
            const qualityLabel = document.getElementById('sleep-quality').value;
            const qualityMap = { poor: 1, fair: 2, good: 4, excellent: 5 };
            const now = new Date();
            const start = new Date(now.getTime() - hours * 60 * 60 * 1000);
            const data = {
                sleep_start: start.toISOString(),
                sleep_end: now.toISOString(),
                quality_score: qualityMap[qualityLabel] || 3
            };

            fetch('/api/logs/sleep', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json().then(data => ({ response, data })))
            .then(({ response, data }) => {
                if (response.ok) {
                    const reactionMessage = data.reaction && data.reaction.message;
                    showAI('sleep-ai', reactionMessage || '😴 Sleep logged!');
                    updateCharts();
                    clearSleepForm();
                } else {
                    const errorFields = Array.isArray(data.fields) ? data.fields.join(' | ') : null;
                    showAI('sleep-ai', errorFields || data.message || '❌ Error logging sleep');
                }
            })
            .catch(() => showAI('sleep-ai', '❌ Error logging sleep'));
        }

        function logWater() {
            const amountValue = parseInt(document.getElementById('water-ml').value, 10);
            if (!Number.isFinite(amountValue) || amountValue < 50) {
                showAI('water-ai', '❌ Please enter at least 50 ml.');
                return;
            }
            const data = { amount_ml: amountValue };

            fetch('/api/logs/hydration', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json().then(data => ({ response, data })))
            .then(({ response, data }) => {
                if (response.ok) {
                    const reactionMessage = data.reaction && data.reaction.message;
                    showAI('water-ai', reactionMessage || '💧 Water logged!');
                    updateCharts();
                    document.getElementById('water-ml').value = '';
                } else {
                    const errorFields = Array.isArray(data.fields) ? data.fields.join(' | ') : null;
                    showAI('water-ai', errorFields || data.message || '❌ Error logging water');
                }
            })
            .catch(() => showAI('water-ai', '❌ Error logging water'));
        }

        function logMood() {
            const sliderValue = parseInt(document.getElementById('mood-rating').value, 10);
            const moodScore = Math.min(5, Math.max(1, Math.ceil(sliderValue / 2)));
            const data = {
                mood_score: moodScore,
                note: document.getElementById('mood-notes').value
            };

            fetch('/api/logs/mood', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json().then(data => ({ response, data })))
            .then(({ response, data }) => {
                if (response.ok) {
                    const reactionMessage = data.reaction && data.reaction.message;
                    showAI('mood-ai', reactionMessage || '😊 Mood logged!');
                    updateCharts();
                    document.getElementById('mood-notes').value = '';
                } else {
                    const errorFields = Array.isArray(data.fields) ? data.fields.join(' | ') : null;
                    showAI('mood-ai', errorFields || data.message || '❌ Error logging mood');
                }
            })
            .catch(() => showAI('mood-ai', '❌ Error logging mood'));
        }

        function getWeeklyInsight() {
            showAI('weekly-insight', '⏳ Generating insight...');
            fetch('/api/insights/weekly', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(response => response.json())
            .then(data => {
                if (data.error === 'insight_unavailable') {
                    showAI('weekly-insight', 'No insights yet. Keep logging!');
                    return;
                }
                const positives = Array.isArray(data.positives) ? data.positives : [];
                const suggestions = Array.isArray(data.suggestions) ? data.suggestions : [];
                const concern = data.concern || 'No concerns reported.';
                const message = `Positives: ${positives.join(' • ')}\n` +
                    `Concern: ${concern}\n` +
                    `Suggestions: ${suggestions.join(' • ')}`;
                showAI('weekly-insight', message);
            })
            .catch(() => showAI('weekly-insight', '❌ Error getting insights'));
        }

        function showAI(elementId, message) {
            const el = document.getElementById(elementId);
            if (!window.__aiTimers) {
                window.__aiTimers = {};
            }
            if (window.__aiTimers[elementId]) {
                clearTimeout(window.__aiTimers[elementId]);
            }

            el.classList.remove('show');
            el.classList.add('hidden');

            window.__aiTimers[elementId] = setTimeout(() => {
                el.textContent = message;
                el.classList.remove('hidden');
                el.classList.add('show');
            }, 600);
        }

        function appendChatMessage(role, message) {
            const thread = document.getElementById('chat-thread');
            const bubble = document.createElement('div');
            const roleClass = role === 'user' ? 'chat-user' : 'chat-assistant';
            bubble.className = `chat-message ${roleClass}`;
            bubble.textContent = message;
            thread.appendChild(bubble);
            thread.scrollTop = thread.scrollHeight;
            return bubble;
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) {
                return;
            }

            appendChatMessage('user', message);
            const pending = appendChatMessage('assistant', 'Thinking...');
            pending.classList.add('chat-pending');
            input.value = '';

            const payload = { message };
            const sessionId = localStorage.getItem('chat_session_id');
            if (sessionId) {
                payload.session_id = sessionId;
            }

            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json().then(data => ({ response, data })))
            .then(({ data }) => {
                const reply = data.reply || "I'm having trouble connecting right now. Please try again.";
                pending.textContent = reply;
                pending.classList.remove('chat-pending');
                if (data.session_id) {
                    localStorage.setItem('chat_session_id', data.session_id);
                }
            })
            .catch(() => {
                pending.textContent = "I'm having trouble connecting right now. Please try again.";
                pending.classList.remove('chat-pending');
            });
        }

        document.getElementById('chat-input').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendChat();
            }
        });

        // Helper functions to clear forms
        function clearMealForm() {
            document.getElementById('meal-food').value = '';
            document.getElementById('meal-cals').value = '';
            document.getElementById('meal-protein').value = '';
        }

        function clearWorkoutForm() {
            document.getElementById('workout-type').value = '';
            document.getElementById('workout-duration').value = '';
            document.getElementById('workout-intensity').value = 'low';
        }

        function clearSleepForm() {
            document.getElementById('sleep-hours').value = '';
            document.getElementById('sleep-quality').value = 'poor';
        }

        // Initialize charts when page loads
        initCharts();
        updateCharts();
    </script>
</body>
</html>
