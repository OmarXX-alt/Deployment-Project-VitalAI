<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VitalAI</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>VitalAI</h1>
            <p>Your AI-powered health companion</p>
        </div>
        
        <div class="form-container">
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@gmail.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit">Log In →</button>
            </form>
            
            <div class="link">
                Don't have an account? <a href="/register">Sign up for free</a>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Hide any previous messages
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
            
            // Validate inputs
            if (!email || !password) {
                document.getElementById('error-message').textContent = 'Please enter both email and password.';
                document.getElementById('error-message').style.display = 'block';
                return;
            }
            
            // Show loading message
            document.getElementById('success-message').textContent = 'Logging in...';
            document.getElementById('success-message').style.display = 'block';
            
            // REAL API CALL to backend
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            })
            .then(response => response.json().then(data => ({ response, data })))
            .then(({ response, data }) => {
                if (data.token) {
                    // Store token in localStorage
                    localStorage.setItem('token', data.token);
                    
                    // Show success message
                    document.getElementById('success-message').textContent = '✓ Login successful! Redirecting to dashboard...';
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    const errorFields = Array.isArray(data.fields) ? data.fields.join(' | ') : null;
                    const fallback = response.ok ? 'Login failed. Please try again.' : 'Login failed. Please check your input.';
                    document.getElementById('error-message').textContent = errorFields || data.message || fallback;
                    document.getElementById('error-message').style.display = 'block';
                    document.getElementById('success-message').style.display = 'none';
                }
            })
            .catch(error => {
                // Handle network error
                document.getElementById('error-message').textContent = 'Server error. Please try again later.';
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('success-message').style.display = 'none';
                console.error('Login error:', error);
            });
        });
    </script>
</body>
</html>
