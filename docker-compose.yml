services:
  mongodb:
    image: mongo:7.0
    container_name: vitalai-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: vitalai
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 10s
      retries: 5

  web:
    build: .
    container_name: vitalai-app
    ports:
      - "5000:5000"
    volumes:
      - .:/main/server/app          # live reload — reflects local file changes
    environment:
      - FLASK_APP=app
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - MONGO_URI=mongodb://mongodb:27017/vitalai
      - INIT_DB=true
    depends_on:
      mongodb:
        condition: service_healthy
    links:
      - mongodb

volumes:
  mongodb_data: